<!--?xml version="1.0" encoding="UTF-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg{fill:#b10838;}
      .fg{fill:#ffffff;}
      .stroke{
        fill:none;
        stroke:#ffffff;
        stroke-width:2.2;
        stroke-linecap:round;
        stroke-linejoin:round;
      }
    </style>
  </defs>

  <!-- Background -->
  <circle class="bg" cx="50" cy="50" r="49.5"></circle>

  <!-- Tractor -->
  <rect class="stroke" x="63" y="47" width="11" height="8" rx="1"></rect>
  <path class="stroke" d="M74 49h6l4 5v4h-10"></path>
  <line class="stroke" x1="63" y1="55" x2="56" y2="55"></line>

  <!-- Fifth wheel -->
  <line class="stroke" x1="56" y1="55" x2="54" y2="55"></line>

  <!-- Drop deck trailer -->
  <polyline class="stroke" points="54,55 44,55 40,60 18,60"></polyline>

  <!-- Rear trailer -->
  <line class="stroke" x1="18" y1="60" x2="14" y2="60"></line>

  <!-- Tall equipment -->
  <rect class="stroke" x="28" y="37" width="10" height="23" rx="1"></rect>
  <line class="stroke" x1="33" y1="37" x2="33" y2="30"></line>
  <line class="stroke" x1="31" y1="30" x2="35" y2="30"></line>
  <line class="stroke" x1="26" y1="46" x2="40" y2="46"></line>

  <!-- Tie-downs -->
  <line class="stroke" x1="28" y1="60" x2="32" y2="52"></line>
  <line class="stroke" x1="38" y1="60" x2="34" y2="52"></line>

  <!-- Wheels -->
  <circle class="stroke" cx="22" cy="66" r="4"></circle>
  <circle class="stroke" cx="32" cy="66" r="4"></circle>
  <circle class="stroke" cx="68" cy="66" r="4"></circle>
  <circle class="stroke" cx="82" cy="66" r="4"></circle>

  <!-- Wheel hubs -->
  <circle class="fg" cx="22" cy="66" r="1.2"></circle>
  <circle class="fg" cx="32" cy="66" r="1.2"></circle>
  <circle class="fg" cx="68" cy="66" r="1.2"></circle>
  <circle class="fg" cx="82" cy="66" r="1.2"></circle>
</svg>